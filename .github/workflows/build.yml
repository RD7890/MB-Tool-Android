name: Build MB Tool APK

on:
  push:
    branches: [main, dev, 'release/**']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Restore Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Extract version
        id: version
        run: |
          VERSION=$(grep 'versionName' app/build.gradle.kts | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "apk_name=MBTool-v${VERSION}-build.${{ github.run_number }}.apk" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      - name: Build Release APK
        run: |
          set -euo pipefail
          ./gradlew assembleRelease --no-daemon --stacktrace
          echo "=== Build outputs ==="
          find app/build/outputs -name "*.apk" 2>/dev/null | head -10 || echo "No APKs found"

      - name: Rename APK
        run: |
          set -euo pipefail
          APK_SRC=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          if [ -z "$APK_SRC" ]; then
            echo "ERROR: No APK found in app/build/outputs/apk/release/"
            find app/build/outputs -type f | head -20
            exit 1
          fi
          TARGET="app/build/outputs/apk/release/${{ steps.version.outputs.apk_name }}"
          cp "$APK_SRC" "$TARGET"
          echo "Renamed: $APK_SRC → $TARGET"
          ls -lh app/build/outputs/apk/release/*.apk

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}-build.${{ github.run_number }}
          name: MB Tool v${{ steps.version.outputs.version }} (Build ${{ github.run_number }})
          body: |
            ## MB Tool — RenderDragon Shader Decompiler
            
            **Build:** ${{ github.run_number }}  
            **Version:** ${{ steps.version.outputs.version }}  
            **Commit:** ${{ github.sha }}
            
            ### What's included
            - Decompile `.material.bin` → GLSL/ESSL source + metadata JSON
            - Recompile edited shaders → `.material.bin` (bit-exact for unchanged shaders)
            - 100% offline, no root, no Termux
            
            ### Install
            Download the APK, enable "Install from unknown sources", install.
          files: app/build/outputs/apk/release/${{ steps.version.outputs.apk_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
